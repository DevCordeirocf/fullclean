spring.application.name=fullclean

# Configuração do Banco de Dados H2 em memória para o teste
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Configuração JPA/Hibernate (o ddl-auto é importante para o teste)
spring.jpa.hibernate.ddl-auto=update

# Desabilitar a segurança padrão do Spring Security para facilitar o teste
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
